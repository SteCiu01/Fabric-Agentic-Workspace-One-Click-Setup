<text x="1022" y="258" text-anchor="middle" font-size="10" fill="#0B5E0B" font-weight="600">Live in production</text>

<!-- toolset strip -->
<rect x="208" y="292" width="721" height="24" rx="12" fill="#FFFFFF" stroke="#DDE4EE" stroke-width="1"/>
<text x="228" y="308" font-size="8.5" fill="#6B7280" letter-spacing="1.1" font-weight="700">TOOLSET</text>
<use href="#fabric-logo" x="292" y="296" width="15" height="15"/>
<text x="313" y="308" font-size="10" fill="#0E6E63" font-weight="700">Fabric Extension</text>
<text x="426" y="308" font-size="10" fill="#6B7280">+</text>
<text x="443" y="308" font-size="10" fill="#0A5FA8" font-weight="700">Fabric MCP</text>
<text x="525" y="308" font-size="10" fill="#6B7280">+</text>
<text x="542" y="308" font-size="10" fill="#8A6B00" font-weight="700">Power BI MCP</text>
<text x="651" y="308" font-size="10" fill="#6B7280">+</text>
<text x="667" y="308" font-size="10" fill="#0E6E63" font-weight="700">fab CLI</text>
<text x="729" y="308" font-size="10" fill="#6B7280">+</text>
<text x="745" y="308" font-size="10" fill="#0078D4" font-weight="700">az CLI</text>
<text x="805" y="308" font-size="10" fill="#6B7280">files + live tools</text>

<!-- ===== Explanation panel ===== -->
<rect x="24" y="320" width="1089" height="198" rx="8" fill="#fff" filter="url(#sh)"/>
<rect x="24" y="320" width="1089" height="32" rx="8" fill="#F3F6FA"/>
<rect x="24" y="336" width="1089" height="16" fill="#F6F8FA"/>
<rect x="24" y="320" width="1089" height="198" rx="8" fill="none" stroke="#E1E6EF" stroke-width="1"/>
<text x="44" y="341" font-size="12.5" font-weight="700" fill="#1F2937">How it works &#8212; mix local files and live tools, then keep them in sync</text>

<circle cx="52" cy="376" r="4" fill="#C9710A"/>
<text x="66" y="380" font-size="11.5" fill="#374151">Per session, <tspan font-weight="700">pull locally only the items you need</tspan>, then do mixed work &#8212; edit some files locally, touch others live.</text>
<circle cx="52" cy="402" r="4" fill="#C9710A"/>
<text x="66" y="406" font-size="11.5" fill="#374151">Both edit paths converge on the same DEV workspace and are captured by the <tspan font-weight="700">same Azure DevOps commit</tspan> &#8212; equally safe.</text>

<rect x="44" y="420" width="1045" height="30" rx="8" fill="#FBF1E6" stroke="#E6C89A" stroke-width="1.2"/>
<text x="60" y="439" font-size="11.5" fill="#A35A12" font-weight="700">&#9888; Golden rule &#8212; keep local = live:</text>
<text x="270" y="439" font-size="11.5" fill="#6E4A1E">re-pull from the live workspace before each new job so your local folder matches it exactly &#8212; this avoids drift.</text>

<rect x="44" y="458" width="1045" height="48" rx="8" fill="#FBF1E6" stroke="#E6C89A" stroke-width="1.2"/>
<text x="62" y="479" font-size="12.5" font-weight="700" fill="#A35A12">Best for</text>
<text x="140" y="479" font-size="12" fill="#6E4A1E">Day-to-day work that blends structured file edits with live checks.</text>
<text x="62" y="498" font-size="10.5" fill="#9A7A4E" font-style="italic">Needs the Fabric extension + fab/az + the two MCP servers, depending on what you touch.</text>
</svg>
