<text x="62" y="114" font-size="11.5" font-weight="700" fill="#E8E8E8">VS Code &#183; Local + Live</text>
<text x="38" y="150" font-size="10" fill="#CFCFCF">Pull only what you need</text>
<text x="38" y="170" font-size="10" fill="#CFCFCF">Edit files AND act live</text>
<text x="38" y="190" font-size="10" fill="#CFCFCF">One DEV &#183; both edit paths</text>
<line x1="38" y1="206" x2="191" y2="206" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
<rect x="38" y="224" width="153" height="34" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
<text x="52" y="245" font-size="10" fill="#F7EFE6" font-weight="700">Local + live in one job</text>
<rect x="24" y="92" width="181" height="190" rx="6" fill="none" stroke="#3C3C3C" stroke-width="1"/>

