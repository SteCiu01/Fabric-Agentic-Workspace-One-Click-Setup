<text x="568" y="37" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">Working Mode C &#8212; Hybrid</text>
<text x="568" y="61" text-anchor="middle" font-size="11" fill="#425466" font-weight="500">Use local files and live tools together, then keep both edit paths aligned.</text>

<!-- ===== CARD 1 : VS Code (dark) ===== -->
