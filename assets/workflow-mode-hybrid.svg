<text x="948" y="152" font-size="10.5" fill="#374151">Synced from Prod branch</text>
<text x="948" y="174" font-size="10.5" fill="#374151">Live for end users</text>
<text x="948" y="196" font-size="10.5" fill="#374151">One release at a time</text>
