<use href="#fabric-logo" x="946" y="99" width="20" height="20"/>
<text x="972" y="113" font-size="12" font-weight="700" fill="#107C10">Fabric PROD</text>
<text x="948" y="152" font-size="10.5" fill="#374151">Synced from Prod branch</text>
<text x="948" y="174" font-size="10.5" fill="#374151">Live for end users</text>
<text x="948" y="196" font-size="10.5" fill="#374151">One release at a time</text>
<rect x="948" y="240" width="149" height="28" rx="6" fill="#EBF7EB" stroke="#A6D8A6" stroke-width="1"/>
<text x="1022" y="258" text-anchor="middle" font-size="10" fill="#0B5E0B" font-weight="600">Live in production</text>

<!-- toolset strip -->
<rect x="374" y="292" width="389" height="24" rx="12" fill="#FFFFFF" stroke="#DDE4EE" stroke-width="1"/>
<text x="394" y="308" font-size="8.5" fill="#6B7280" letter-spacing="1.1" font-weight="700">TOOLSET</text>
<use href="#fabric-logo" x="459" y="296" width="15" height="15"/>
<text x="480" y="308" font-size="10.5" fill="#0E6E63" font-weight="700">Fabric Extension</text>
<text x="605" y="308" font-size="10" fill="#6B7280">pull / edit / push local files</text>

<!-- ===== Explanation panel ===== -->
<rect x="24" y="320" width="1089" height="198" rx="8" fill="#fff" filter="url(#sh)"/>
<rect x="24" y="320" width="1089" height="32" rx="8" fill="#F3F6FA"/>
<rect x="24" y="336" width="1089" height="16" fill="#F6F8FA"/>
<rect x="24" y="320" width="1089" height="198" rx="8" fill="none" stroke="#E1E6EF" stroke-width="1"/>
<text x="44" y="341" font-size="12.5" font-weight="700" fill="#1F2937">How it works &#8212; the original, fully file-based loop</text>

<circle cx="52" cy="376" r="4" fill="#038387"/>
<text x="66" y="380" font-size="11.5" fill="#374151"><tspan font-weight="700">Pull</tspan> the items you need locally, then <tspan font-weight="700">edit the real files</tspan> with the agents (or by hand) &#8212; TMDL, DAX, PBIR, pipeline JSON.</text>
<circle cx="52" cy="402" r="4" fill="#038387"/>
<text x="66" y="406" font-size="11.5" fill="#374151"><tspan font-weight="700">Push</tspan> back via the Fabric extension, <tspan font-weight="700">test</tspan> in the DEV workspace, then <tspan font-weight="700">commit</tspan> to Azure DevOps when happy (<tspan font-weight="700">revert</tspan> if not).</text>
<circle cx="52" cy="428" r="4" fill="#038387"/>
<text x="66" y="432" font-size="11.5" fill="#374151"><tspan font-weight="700">Promote</tspan> with a Pull Request (Dev &#8594; Prod), let prod settings persist, then <tspan font-weight="700">sync</tspan> to the PROD workspace.</text>

<rect x="44" y="448" width="1045" height="58" rx="8" fill="#F0FAF8" stroke="#9FD9CE" stroke-width="1.2"/>
<text x="62" y="471" font-size="12.5" font-weight="700" fill="#0E6E63">Best for</text>
<text x="140" y="471" font-size="12" fill="#2C5F58">Bulk or structured edits &#183; diff-style review &#183; offline work &#183; clean file history.</text>
<text x="62" y="494" font-size="10.5" fill="#5A8B84" font-style="italic">Needs only the Fabric VS Code extension + Git. No CLI or MCP server required.</text>
</svg>
