<!-- Header -->
<rect x="24" y="18" width="1089" height="3" rx="1.5" fill="url(#fabric-rail)"/>
<text x="568" y="37" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">Working Mode A &#8212; Local Files</text>
<text x="568" y="61" text-anchor="middle" font-size="11" fill="#425466" font-weight="500">File-first authoring for structured edits, reviewable diffs, and offline work.</text>

<!-- ===== CARD 1 : VS Code (dark) ===== -->
<rect x="24" y="92" width="181" height="190" rx="6" fill="#1E1E1E" filter="url(#sh)"/>
<rect x="24" y="92" width="181" height="34" rx="8" fill="#252526"/>
<rect x="24" y="108" width="181" height="18" fill="#252526"/>
<use href="#vscode-icon" x="38" y="100" width="18" height="18"/>
<text x="62" y="114" font-size="12" font-weight="700" fill="#E8E8E8">VS Code &#183; Local</text>
<text x="38" y="150" font-size="10" fill="#CFCFCF">Fabric items as local files</text>
<text x="38" y="170" font-size="10" fill="#CFCFCF">Edit TMDL &#183; DAX &#183; PBIR</text>
<text x="38" y="190" font-size="10" fill="#CFCFCF">Notebooks &#183; Pipelines &#183; Reports</text>
<line x1="38" y1="206" x2="191" y2="206" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
<rect x="38" y="224" width="153" height="34" rx="6" fill="rgba(85,221,185,0.12)" stroke="rgba(85,221,185,0.34)" stroke-width="0.8"/>
<text x="52" y="245" font-size="10" fill="#DDFBF4" font-weight="700">File-first editing loop</text>
<rect x="24" y="92" width="181" height="190" rx="6" fill="none" stroke="#3C3C3C" stroke-width="1"/>

<!-- connector 1 -> 2 : Push / Pull -->
<text x="228" y="184" text-anchor="middle" font-size="10.5" fill="#0078D4" font-weight="700">Push</text>
<path d="M209,194 L247,194" stroke="#0078D4" stroke-width="1.55" stroke-linecap="round" fill="none" marker-end="url(#arrow-blue)"/>
<path d="M247,212 L209,212" stroke="#107C10" stroke-width="1.55" stroke-linecap="round" fill="none" stroke-dasharray="4,4" marker-end="url(#arrow-green)"/>
<text x="228" y="230" text-anchor="middle" font-size="10.5" fill="#107C10" font-weight="700">Pull</text>

