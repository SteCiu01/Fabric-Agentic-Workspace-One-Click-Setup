<text x="743" y="113" font-size="12" font-weight="700" fill="#5B2D90">Azure DevOps</text>
<rect x="721" y="138" width="98" height="20" rx="10" fill="#5B2D90"/>
<circle cx="733" cy="148" r="7" fill="#fff"/>
<use href="#git-logo" x="728" y="143" width="10" height="10"/>
<text x="779" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Prod Branch</text>
<text x="721" y="184" font-size="10.5" fill="#374151">Promoted from Dev via PR</text>
<text x="721" y="206" font-size="10.5" fill="#374151">Prod settings persist</text>
<rect x="721" y="240" width="149" height="28" rx="6" fill="#F6F1FC" stroke="#DCCBEF" stroke-width="1"/>
<text x="795" y="258" text-anchor="middle" font-size="10" fill="#4A2475" font-weight="600">Updated only by PR</text>

<!-- connector 4 -> 5 : Sync -->
<text x="909" y="190" text-anchor="middle" font-size="10.5" fill="#107C10" font-weight="700">Sync</text>
<path d="M888,204 L930,204" stroke="#107C10" stroke-width="1.65" stroke-linecap="round" fill="none" marker-end="url(#arrow-green)"/>

<!-- ===== CARD 5 : Fabric PROD ===== -->
<rect x="932" y="92" width="181" height="190" rx="6" fill="#fff" filter="url(#sh)"/>
<rect x="932" y="92" width="181" height="34" rx="8" fill="#FFFFFF"/>
<rect x="932" y="108" width="181" height="18" fill="#FFFFFF"/>
<rect x="932" y="92" width="181" height="4" rx="2" fill="#107C10"/>
