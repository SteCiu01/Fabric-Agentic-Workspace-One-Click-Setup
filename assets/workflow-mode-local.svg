<text x="682" y="198" text-anchor="middle" font-size="10.5" fill="#5B2D90" font-weight="700">Request</text>
<path d="M661,214 L703,214" stroke="#5B2D90" stroke-width="1.65" stroke-linecap="round" fill="none" marker-end="url(#arrow-purple)"/>

<!-- ===== CARD 4 : Azure DevOps · Prod Branch ===== -->
