<text x="291" y="113" font-size="12" font-weight="700" fill="#038387">Fabric DEV</text>
<text x="267" y="152" font-size="10.5" fill="#374151">Local changes pushed here</text>
<text x="267" y="174" font-size="10.5" fill="#374151">Tested live in the portal</text>
<text x="267" y="196" font-size="10.5" fill="#374151">Manual portal edits welcome</text>
<rect x="267" y="240" width="149" height="28" rx="6" fill="#F0FAF8" stroke="#9FD9CE" stroke-width="1"/>
<text x="341" y="258" text-anchor="middle" font-size="10" fill="#0E6E63" font-weight="600">Live testing ground</text>

<!-- connector 2 -> 3 : Commit / Revert -->
<text x="455" y="184" text-anchor="middle" font-size="10.5" fill="#0078D4" font-weight="700">Commit</text>
<path d="M436,194 L474,194" stroke="#0078D4" stroke-width="1.55" stroke-linecap="round" fill="none" marker-end="url(#arrow-blue)"/>
<path d="M474,212 L436,212" stroke="#D83B01" stroke-width="1.55" stroke-linecap="round" fill="none" stroke-dasharray="4,4" marker-end="url(#arrow-orange)"/>
<text x="455" y="230" text-anchor="middle" font-size="10.5" fill="#D83B01" font-weight="700">Revert</text>

