<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1137 540" width="1137" height="540" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="1137" height="540" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow" x="-4%" y="-6%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.2" flood-color="#000000" flood-opacity="0.11"/>
    </filter>
    <linearGradient id="fabric-rail" x1="28" x2="1109" y1="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6AD6F9"/>
      <stop offset="0.30" stop-color="#60E9D0"/>
      <stop offset="0.68" stop-color="#6DE9BB"/>
      <stop offset="1" stop-color="#ABE88E"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0078D4"/></marker>
    <marker id="arrow-purple" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5B2D90"/></marker>
    <marker id="arrow-green" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#107C10"/></marker>
    <marker id="arrow-orange" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#F05033"/></marker>

    <linearGradient id="fab-a" x1="12.953" x2="12.953" y1="44" y2="29.457" gradientUnits="userSpaceOnUse"><stop offset="0.056" stop-color="#2AAC94"/><stop offset="1" stop-color="#085954"/></linearGradient>
    <linearGradient id="fab-b" x1="31.331" x2="17.286" y1="33.448" y2="18.173" gradientUnits="userSpaceOnUse"><stop offset="0.042" stop-color="#ABE88E"/><stop offset="0.549" stop-color="#2AAA92"/><stop offset="0.906" stop-color="#117865"/></linearGradient>
    <linearGradient id="fab-e" x1="7.013" x2="39.06" y1="10.247" y2="25.128" gradientUnits="userSpaceOnUse"><stop stop-color="#6AD6F9"/><stop offset="0.23" stop-color="#60E9D0"/><stop offset="0.651" stop-color="#6DE9BB"/><stop offset="0.994" stop-color="#ABE88E"/></linearGradient>
    <symbol id="fabric-logo" viewBox="0 0 48 48">
      <path fill="url(#fab-e)" d="m12.899 21.235 26.938-3.98a1.6 1.6 0 0 0 1.323-1.17l2.78-10.06a1.595 1.595 0 0 0-1.74-2.012L16.498 7.81a7.19 7.19 0 0 0-5.777 5.193L7.013 26.438c.744-2.717 1.202-4.355 5.886-5.203"/>
      <path fill="url(#fab-b)" d="M10.14 32.152c-4.863.753-5.861 4.423-5.861 4.423l4.656-17.11 24.333-3.292-3.318 12.052a1.71 1.71 0 0 1-1.388 1.244l-.136.022-18.423 2.684z"/>
      <path fill="url(#fab-a)" fill-rule="evenodd" d="m5.64 31.6-.586 2.144c-.218.685-.524 1.693-.689 2.59a5.63 5.63 0 0 0 4.638 7.588c.792.114 1.688.108 2.692-.04l4.613-.636a2.92 2.92 0 0 0 2.421-2.127l3.175-11.662L5.64 31.599Z" clip-rule="evenodd"/>
    </symbol>
    <symbol id="devops-logo" viewBox="0 0 18 18">
      <path d="M17 4v10l-3 2l-7.03-2.58V16l-3.47-4.5l10.5.83V5.17L17 4ZM13.97 3.42L6.94 1L4 3.5v11l2.94-1.08V5.25l7.03 1.59V3.42Z" fill="#0078D4"/>
    </symbol>
    <symbol id="git-logo" viewBox="0 0 97 97">
      <path d="M92.71 44.41 52.59 4.29a6.34 6.34 0 0 0-8.97 0l-8.33 8.33 10.57 10.57a7.53 7.53 0 0 1 9.54 9.6l10.18 10.18a7.54 7.54 0 1 1-4.52 4.27L51.57 37.75v24.98a7.54 7.54 0 1 1-6.19-.22V37.29a7.55 7.55 0 0 1-4.1-9.9L30.86 16.96 4.29 43.53a6.34 6.34 0 0 0 0 8.97l40.12 40.12a6.34 6.34 0 0 0 8.97 0l39.33-39.33a6.34 6.34 0 0 0 0-8.88Z" fill="#F05033"/>
    </symbol>
  </defs>

  <rect x="28" y="14" width="1081" height="4" rx="2" fill="url(#fabric-rail)"/>
  <text x="568.5" y="40" text-anchor="middle" font-size="18" font-weight="750" fill="#242424">Fabric Agentic Workspace &#8212; Lifecycle &amp; Deployment</text>

  <rect x="117" y="58" width="903" height="44" rx="22" fill="#F6FBFF" stroke="#D9E8F5"/>
  <text x="568.5" y="85" text-anchor="middle" font-size="13.5" font-weight="700" fill="#465A69">However you edit &#8212; local &#183; live &#183; hybrid &#8212; every change lands in the DEV workspace first</text>

  <g id="cards">
    <g transform="translate(48 136)">
      <rect width="230" height="196" rx="14" fill="#FFFFFF" stroke="#BFE7E0" filter="url(#shadow)"/>
      <rect width="230" height="56" rx="14" fill="#E7F8F5"/>
      <rect y="40" width="230" height="16" fill="#E7F8F5"/>
      <use href="#fabric-logo" x="20" y="14" width="36" height="36"/>
      <text x="70" y="31" font-size="16" font-weight="800" fill="#038387">Fabric DEV</text>
      <text x="70" y="50" font-size="12" font-weight="700" fill="#52657A">Workspace</text>
      <text x="22" y="88" font-size="13" font-weight="700" fill="#34445A">All authoring lands here first</text>
      <text x="22" y="116" font-size="12.3" fill="#5F6F82">Validate pipelines, reports, and models.</text>
      <text x="22" y="138" font-size="12.3" fill="#5F6F82">Use portal, VS Code, CLI, or MCP.</text>
      <text x="22" y="160" font-size="12.3" fill="#5F6F82">Commit only after DEV is tested.</text>
    </g>

    <g transform="translate(328 136)">
      <rect width="230" height="196" rx="14" fill="#FFFFFF" stroke="#BBDDF5" filter="url(#shadow)"/>
      <rect width="230" height="56" rx="14" fill="#EAF4FD"/>
      <rect y="40" width="230" height="16" fill="#EAF4FD"/>
      <use href="#devops-logo" x="20" y="16" width="32" height="32"/>
      <text x="66" y="31" font-size="16" font-weight="800" fill="#005A9E">Azure DevOps</text>
      <rect x="66" y="36" width="92" height="18" rx="9" fill="#FFFFFF" stroke="#BBDDF5"/>
      <use href="#git-logo" x="74" y="39" width="12" height="12"/>
      <text x="94" y="49" font-size="11.5" font-weight="700" fill="#52657A">dev branch</text>
      <text x="22" y="88" font-size="13" font-weight="700" fill="#34445A">Commit DEV workspace state</text>
      <text x="22" y="116" font-size="12.3" fill="#5F6F82">Checkpoint every tested change.</text>
      <text x="22" y="138" font-size="12.3" fill="#5F6F82">Compare diffs and review history.</text>
      <text x="22" y="160" font-size="12.3" fill="#5F6F82">Revert DEV to any previous commit.</text>
    </g>

    <g transform="translate(608 136)">
      <rect width="230" height="196" rx="14" fill="#FFFFFF" stroke="#D9C7EE" filter="url(#shadow)"/>
      <rect width="230" height="56" rx="14" fill="#F4ECFC"/>
      <rect y="40" width="230" height="16" fill="#F4ECFC"/>
      <use href="#devops-logo" x="20" y="16" width="32" height="32"/>
      <text x="66" y="31" font-size="16" font-weight="800" fill="#5B2D90">Azure DevOps</text>
      <rect x="66" y="36" width="98" height="18" rx="9" fill="#FFFFFF" stroke="#D9C7EE"/>
      <use href="#git-logo" x="74" y="39" width="12" height="12"/>
      <text x="94" y="49" font-size="11.5" font-weight="700" fill="#52657A">prod branch</text>
      <text x="22" y="88" font-size="13" font-weight="700" fill="#34445A">Promote by pull request</text>
      <text x="22" y="116" font-size="12.3" fill="#5F6F82">Review dev-to-prod changes.</text>
      <text x="22" y="138" font-size="12.3" fill="#5F6F82">Keep production history controlled.</text>
      <text x="22" y="160" font-size="12.3" fill="#5F6F82">Preserve prod-specific overrides.</text>
    </g>

    <g transform="translate(888 136)">
      <rect width="230" height="196" rx="14" fill="#FFFFFF" stroke="#B9DEA8" filter="url(#shadow)"/>
      <rect width="230" height="56" rx="14" fill="#EDF8E8"/>
      <rect y="40" width="230" height="16" fill="#EDF8E8"/>
      <use href="#fabric-logo" x="20" y="14" width="36" height="36"/>
      <text x="70" y="31" font-size="16" font-weight="800" fill="#107C10">Fabric PROD</text>
      <text x="70" y="50" font-size="12" font-weight="700" fill="#52657A">Workspace</text>
      <text x="22" y="88" font-size="13" font-weight="700" fill="#34445A">Sync approved production state</text>
      <text x="22" y="116" font-size="12.3" fill="#5F6F82">Stable reports, models, and pipelines.</text>
      <text x="22" y="138" font-size="12.3" fill="#5F6F82">No experimental authoring here.</text>
      <text x="22" y="160" font-size="12.3" fill="#5F6F82">Operational workspace for users.</text>
    </g>
  </g>

  <g id="connectors" font-size="11.5" font-weight="800">
    <path d="M290 211 L314 211" fill="none" stroke="#0078D4" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
    <text x="302" y="195" text-anchor="middle" fill="#0078D4">commit</text>
    <path d="M314 255 L290 255" fill="none" stroke="#107C10" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-green)"/>
    <text x="302" y="276" text-anchor="middle" fill="#107C10">revert</text>

    <path d="M570 232 L594 232" fill="none" stroke="#5B2D90" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
    <text x="582" y="216" text-anchor="middle" fill="#5B2D90">PR</text>

    <path d="M850 232 L874 232" fill="none" stroke="#F05033" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
    <text x="862" y="216" text-anchor="middle" fill="#F05033">sync</text>
  </g>

  <g id="safety" transform="translate(48 382)">
    <rect width="1070" height="130" rx="15" fill="#FBFCFE" stroke="#DDE6F0"/>
    <text x="28" y="32" font-size="15.5" font-weight="800" fill="#111827">Why this is safe by design</text>

    <g transform="translate(28 52)">
      <rect width="302" height="40" rx="10" fill="#F0FAF8" stroke="#BFE7E0"/>
      <text x="16" y="17" font-size="12.5" font-weight="800" fill="#038387">DEV</text>
      <text x="58" y="17" font-size="12" font-weight="650" fill="#52657A">Build and test freely before</text>
      <text x="58" y="32" font-size="12" font-weight="650" fill="#52657A">anything reaches production.</text>
    </g>

    <g transform="translate(384 52)">
      <rect width="302" height="40" rx="10" fill="#EFF6FC" stroke="#BBDDF5"/>
      <text x="16" y="17" font-size="12.5" font-weight="800" fill="#005A9E">Azure DevOps</text>
      <text x="118" y="17" font-size="12" font-weight="650" fill="#52657A">Commit, diff, review,</text>
      <text x="118" y="32" font-size="12" font-weight="650" fill="#52657A">and revert workspace state.</text>
    </g>

    <g transform="translate(740 52)">
      <rect width="302" height="40" rx="10" fill="#F1FAED" stroke="#B9DEA8"/>
      <text x="16" y="17" font-size="12.5" font-weight="800" fill="#107C10">PROD</text>
      <text x="62" y="17" font-size="12" font-weight="650" fill="#52657A">Receives only reviewed,</text>
      <text x="62" y="32" font-size="12" font-weight="650" fill="#52657A">parameterized changes.</text>
    </g>

    <text x="535" y="113" text-anchor="middle" font-size="12.5" font-weight="750" fill="#34445A">Promote only when confident &#8212; and return to any previous version whenever needed.</text>
  </g>
</svg>
